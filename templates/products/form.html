{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block breadcrumbs %}
<div class="breadcrumbs">
    <a href="{{ url_for('dashboard.index') }}"><i class="fas fa-home"></i></a>
    <i class="fas fa-chevron-right breadcrumb-sep"></i>
    <a href="{{ url_for('products.list_products') }}">Sản phẩm</a>
    <i class="fas fa-chevron-right breadcrumb-sep"></i>
    <span class="breadcrumb-current">{{ title }}</span>
</div>
{% endblock %}

{% block content %}
<form method="POST" {% if product %}data-autosave{% endif %}>
    <div class="card">
        <div class="card-header">
            <h3><i class="fas fa-cube" style="color:var(--primary);margin-right:8px"></i>Thông tin sản phẩm</h3>
        </div>
        <div class="card-body">
            <div class="form-grid">
                <div class="form-group">
                    <label>Tên sản phẩm <span class="required">*</span></label>
                    <input type="text" name="name" class="form-control" required value="{{ product.name if product else '' }}" placeholder="VD: Phần mềm CRM Pro">
                </div>
                <div class="form-group">
                    <label>Mã SKU</label>
                    <input type="text" name="sku" class="form-control" value="{{ product.sku if product else '' }}" placeholder="VD: SP-001">
                </div>
                <div class="form-group">
                    <label>Mã vạch</label>
                    <input type="text" name="barcode" class="form-control" value="{{ product.barcode if product else '' }}">
                </div>
                <div class="form-group">
                    <label>Danh mục</label>
                    <select name="category" class="form-control">
                        {% for c in categories %}
                        <option value="{{ c }}" {% if product and product.category == c %}selected{% elif not product and c == 'Khác' %}selected{% endif %}>{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Đơn vị</label>
                    <select name="unit" class="form-control">
                        {% for u in units %}
                        <option value="{{ u }}" {% if product and product.unit == u %}selected{% elif not product and u == 'Cái' %}selected{% endif %}>{{ u }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Đơn vị tiền tệ</label>
                    <select name="currency" class="form-control">
                        <option value="VND" {% if not product or product.currency == 'VND' %}selected{% endif %}>VND</option>
                        <option value="USD" {% if product and product.currency == 'USD' %}selected{% endif %}>USD</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Mô tả</label>
                <textarea name="description" class="form-control" rows="3" placeholder="Mô tả sản phẩm...">{{ product.description if product else '' }}</textarea>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h3><i class="fas fa-tags" style="color:var(--primary);margin-right:8px"></i>Giá & Kho</h3>
        </div>
        <div class="card-body">
            <div class="form-grid">
                <div class="form-group">
                    <label>Giá bán</label>
                    <input type="number" name="sell_price" class="form-control" step="1" value="{{ product.sell_price|int if product else 0 }}" min="0">
                </div>
                <div class="form-group">
                    <label>Giá vốn</label>
                    <input type="number" name="cost_price" class="form-control" step="1" value="{{ product.cost_price|int if product else 0 }}" min="0">
                </div>
                <div class="form-group">
                    <label>Tồn kho</label>
                    <input type="number" name="stock_quantity" class="form-control" step="1" value="{{ product.stock_quantity|int if product else 0 }}" id="stockInput">
                </div>
                <div class="form-group">
                    <label>Tồn kho tối thiểu</label>
                    <input type="number" name="min_stock" class="form-control" step="1" value="{{ product.min_stock|int if product else 0 }}" min="0">
                </div>
                <div class="form-group">
                    <label>Tồn kho tối đa</label>
                    <input type="number" name="max_stock" class="form-control" step="1" value="{{ product.max_stock|int if product else 0 }}" min="0">
                </div>
            </div>
            <div style="display:flex;gap:24px;margin-top:8px">
                <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
                    <input type="checkbox" name="is_active" {% if not product or product.is_active %}checked{% endif %}> Đang bán
                </label>
                <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
                    <input type="checkbox" name="is_service" {% if product and product.is_service %}checked{% endif %} onchange="document.getElementById('stockInput').disabled=this.checked"> Là dịch vụ (không quản lý kho)
                </label>
            </div>
        </div>
    </div>

    <div class="form-actions" style="border:none;padding-top:0">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu sản phẩm</button>
        <a href="{{ url_for('products.list_products') }}" class="btn btn-default">Hủy</a>
    </div>
</form>
{% endblock %}
